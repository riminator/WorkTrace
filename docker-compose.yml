services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: kb_pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vector
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vector"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgvector_data:
