# openshift/nginx.conf
# Serves the Vite SPA on port 8080 (non-root, required by OpenShift).
# Proxies /api/* to the backend ClusterIP service so the browser never
# needs to know the backend URL — use VITE_API_URL=/api at build time.

server {
    listen       8080;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend Service (ClusterIP, port 8000).
    # The Service name must match metadata.name in backend.yaml.
    location /api/ {
        # Strip the /api prefix before forwarding
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://knowledgebase-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Allow large file uploads (matches backend multipart routes)
        client_max_body_size 50m;
    }

    # Healthcheck endpoint used by the Route/liveness probe
    location /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
